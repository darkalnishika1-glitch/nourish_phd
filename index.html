<!DOCTYPE html>
<html lang="en">
<head>

<style>
:root{--fn-display:'Fraunces',serif;--fn-body:'DM Sans',sans-serif;--bg:#FEFBF6;--fg:#1C1917;--card:#FFFFFF;--border:#E8E0D4;--muted:#8C8279;--accent:#C05621;--ring-bg:#F3EDE4;--hint-bg:#FFF8F0;--hint-fg:#A0622D;--nav-bg:rgba(255,253,251,0.92)}
@media(prefers-color-scheme:dark){:root{--bg:#151210;--fg:#F0EBE3;--card:#1E1A17;--border:#332D27;--muted:#8C8279;--accent:#E8913A;--ring-bg:#262018;--hint-bg:#261D14;--hint-fg:#D4954A;--nav-bg:rgba(26,22,19,0.92)}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--fn-body);background:var(--bg);color:var(--fg)}
button{font-family:var(--fn-body);cursor:pointer;border:none;background:none;transition:transform 0.1s,opacity 0.15s}
button:active{transform:scale(0.97);opacity:0.85}
::-webkit-scrollbar{display:none}
.app{max-width:430px;margin:0 auto;height:100vh;height:100dvh;position:relative;overflow:hidden;display:flex;flex-direction:column}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:80px}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--nav-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:100}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 16px;color:var(--muted);transition:color 0.2s}
.nav-btn.active{color:var(--accent)}
.nav-btn span{font-size:10px;font-weight:400}.nav-btn.active span{font-weight:600}
.page{padding:0 20px 20px;animation:fadeUp 0.35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.section{background:var(--card);border-radius:20px;padding:20px;margin-bottom:14px;border:1px solid var(--border)}
.section-sm{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:8px;border:1px solid var(--border)}
h1{font-family:var(--fn-display);font-size:26px;font-weight:700;color:var(--fg)}
h3{font-family:var(--fn-display);font-size:14px;font-weight:600;color:var(--fg);margin-bottom:10px}
.sub{font-size:12px;color:var(--muted);margin-top:4px}
.date{font-size:12px;color:var(--muted);letter-spacing:0.04em;text-transform:uppercase;margin-bottom:2px}
.chip{display:inline-block;padding:6px 13px;border-radius:20px;font-size:12px;border:1px solid var(--border);background:var(--card);color:var(--fg);margin:3px;transition:all 0.2s}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.filter-btn{padding:6px 14px;border-radius:16px;font-size:11px;white-space:nowrap;border:1px solid var(--border);color:var(--muted);margin-right:6px;transition:all 0.2s}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.macro-bar{height:5px;border-radius:3px;background:var(--ring-bg);overflow:hidden;margin-top:3px}
.macro-fill{height:100%;border-radius:3px;transition:width 0.5s ease}
.hint{margin-top:14px;padding:10px 14px;background:var(--hint-bg);border-radius:10px;font-size:12px;color:var(--hint-fg);line-height:1.5}
.recipe-card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:10px;border:1px solid var(--border)}
.tag{font-size:9px;padding:2px 8px;border-radius:8px;font-weight:600;text-transform:uppercase}
.ing-tag{padding:2px 8px;border-radius:6px;font-size:10px;display:inline-block;margin:2px}
.log-btn{padding:8px 14px;border-radius:10px;background:var(--accent);color:#fff;font-size:11px;font-weight:600;white-space:nowrap}
.paper-card{padding:14px;border-radius:12px;margin-bottom:8px;cursor:pointer;transition:all 0.2s}
.stat-card{padding:14px;border-radius:12px;margin-bottom:8px;background:var(--ring-bg);border:1px solid var(--border)}
.skill-card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:10px;border:1px solid var(--border)}
.metric-box{padding:12px;border-radius:10px;background:var(--ring-bg);text-align:center}
.metric-val{font-size:16px;font-weight:700;font-family:var(--fn-display);color:var(--fg)}
.metric-label{font-size:10px;color:var(--muted);margin-top:2px}
.splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity 0.5s}
.splash.hide{opacity:0;pointer-events:none}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const e=React.createElement,{useState,useEffect,useRef,useCallback}=React;

const TARGETS={calories:2200,protein:75,carbs:280,fat:70};

const INGREDIENTS=["Rice","Dal","Paneer","Chickpeas","Potato","Spinach","Tomato","Onion","Curd/Yogurt","Milk","Eggs","Bread","Oats","Banana","Peanuts","Ghee","Coconut","Lentils","Mushroom","Capsicum","Cauliflower","Peas","Tofu","Cheese"];

const RECIPES=[
{name:"Paneer Butter Masala",ing:["Paneer","Tomato","Onion","Ghee"],cal:480,p:22,c:18,f:34,t:30,meal:"lunch",tip:"Add cream for extra calories"},
{name:"Chole (Chickpea Curry)",ing:["Chickpeas","Tomato","Onion"],cal:350,p:18,c:52,f:8,t:35,meal:"lunch",tip:"Pair with rice + ghee for surplus"},
{name:"Dal Tadka + Rice",ing:["Dal","Rice","Ghee","Tomato","Onion"],cal:520,p:20,c:78,f:14,t:25,meal:"lunch",tip:"Use toor dal for higher protein"},
{name:"Palak Paneer",ing:["Paneer","Spinach","Onion","Ghee"],cal:380,p:20,c:12,f:28,t:30,meal:"lunch",tip:"Blend cashews in for richness"},
{name:"Aloo Paratha + Curd",ing:["Potato","Curd/Yogurt","Ghee"],cal:450,p:12,c:58,f:20,t:25,meal:"breakfast",tip:"Stuff with extra ghee for density"},
{name:"Egg Bhurji + Toast",ing:["Eggs","Bread","Onion","Tomato"],cal:380,p:24,c:32,f:18,t:15,meal:"breakfast",tip:"Add cheese for extra cal"},
{name:"PB Banana Oats",ing:["Oats","Banana","Peanuts","Milk"],cal:520,p:18,c:72,f:20,t:10,meal:"breakfast",tip:"Top with honey and seeds"},
{name:"Paneer Tikka Wrap",ing:["Paneer","Bread","Capsicum","Onion"],cal:420,p:24,c:38,f:20,t:20,meal:"lunch",tip:"Use whole wheat roti"},
{name:"Mushroom Masala + Rice",ing:["Mushroom","Rice","Tomato","Onion"],cal:380,p:14,c:62,f:10,t:25,meal:"dinner",tip:"Add peas for extra protein"},
{name:"Curd Rice",ing:["Rice","Curd/Yogurt"],cal:320,p:10,c:58,f:6,t:10,meal:"dinner",tip:"Calorie-dense with ghee tempering"},
{name:"Rajma Chawal",ing:["Lentils","Rice","Tomato","Onion"],cal:480,p:22,c:76,f:8,t:35,meal:"dinner",tip:"Soak kidney beans overnight"},
{name:"Tofu Bhurji",ing:["Tofu","Onion","Tomato","Capsicum"],cal:280,p:20,c:12,f:18,t:15,meal:"breakfast",tip:"Crumble firm tofu for best texture"},
{name:"Coconut Lentil Soup",ing:["Lentils","Coconut","Tomato"],cal:340,p:16,c:38,f:14,t:25,meal:"dinner",tip:"Add rice on the side"},
{name:"Masala Dosa",ing:["Rice","Potato","Onion","Ghee"],cal:400,p:8,c:60,f:16,t:30,meal:"breakfast",tip:"Fermented batter = gut health"},
{name:"Cheese Toast + Banana Shake",ing:["Bread","Cheese","Banana","Milk"],cal:500,p:18,c:62,f:22,t:10,meal:"snack",tip:"Quick 500-cal snack in 10 min"},
{name:"Peanut Chikki + Milk",ing:["Peanuts","Milk"],cal:350,p:16,c:28,f:22,t:5,meal:"snack",tip:"Jaggery + peanut — buy or make"},
{name:"Paneer Stuffed Paratha",ing:["Paneer","Ghee","Curd/Yogurt"],cal:480,p:22,c:42,f:26,t:25,meal:"breakfast",tip:"High-cal breakfast champion"},
{name:"Vegetable Pulao",ing:["Rice","Peas","Cauliflower","Ghee"],cal:420,p:10,c:68,f:14,t:25,meal:"lunch",tip:"Add fried cashews on top"},
{name:"Matar Paneer",ing:["Paneer","Peas","Tomato","Onion"],cal:400,p:22,c:24,f:26,t:30,meal:"dinner",tip:"Creamy base with cashew paste"},
{name:"Banana Peanut Smoothie",ing:["Banana","Peanuts","Milk","Oats"],cal:480,p:18,c:64,f:20,t:5,meal:"snack",tip:"Blend thick — add honey"},
{name:"Gobi Aloo (Dry)",ing:["Cauliflower","Potato","Onion","Ghee"],cal:340,p:8,c:42,f:16,t:25,meal:"dinner",tip:"Great with roti + dal combo"},
{name:"Spinach Dal",ing:["Spinach","Dal","Tomato","Ghee"],cal:300,p:18,c:38,f:8,t:25,meal:"dinner",tip:"Iron-rich and protein-dense"},
{name:"Egg Fried Rice",ing:["Eggs","Rice","Onion","Peas"],cal:420,p:18,c:62,f:12,t:15,meal:"lunch",tip:"Toss with soy sauce and sesame"},
{name:"Peanut Poha",ing:["Rice","Peanuts","Onion","Potato"],cal:380,p:12,c:52,f:16,t:15,meal:"breakfast",tip:"Flattened rice — quick and filling"},
];

const PAPERS=[
{id:1,title:"Paper 1",status:"Revision",desc:"Reviewer comments received. Address feedback and resubmit.",color:"#E8913A"},
{id:2,title:"Paper 2",status:"Drafting",desc:"Draft in progress. Continue analysis and writing.",color:"#5B8C5A"},
{id:3,title:"Paper 3",status:"Planning",desc:"Needs data organization and initial analysis.",color:"#7B68AE"},
{id:4,title:"Paper 4",status:"Ideation",desc:"Identify novel angle from existing dataset.",color:"#C4697C"},
{id:5,title:"Paper 5",status:"Ideation",desc:"Explore statistical methods for new insights.",color:"#4A90A4"},
];

const STATS=[
{m:"Principal Component Analysis",u:"Reduce high-dimensional phenotypic/genotypic data to identify dominant variation patterns.",pp:"3–5"},
{m:"Mixed-Effects Models",u:"Account for vineyard block, year, and genotype as random/fixed effects in trait analysis.",pp:"2–4"},
{m:"Correlation Heatmaps",u:"Visualize pairwise relationships among traits (yield, sugar, acidity, phenolics).",pp:"3–5"},
{m:"ANOVA + Post-hoc (Tukey)",u:"Compare treatment groups or cultivar performance across seasons.",pp:"2–3"},
{m:"Random Forest",u:"Predict quality traits from input variables; rank feature importance.",pp:"4–5"},
{m:"Cluster Analysis",u:"Group cultivars or sites by multivariate trait profiles (k-means / hierarchical).",pp:"3–5"},
{m:"GGE Biplot",u:"Genotype × Environment interaction — standard in viticulture publications.",pp:"4–5"},
{m:"Structural Equation Modeling",u:"Model causal pathways: environment → physiology → fruit quality.",pp:"5"},
{m:"Time-Series Decomposition",u:"Multi-year data: decompose seasonal trends, detect anomalies.",pp:"3–4"},
{m:"Network Analysis",u:"Trait correlation networks — identify hub traits driving multiple outcomes.",pp:"5"},
];

const SKILLS=[
{name:"R / ggplot2",cat:"Data",prog:60,note:"Publication-quality figures"},
{name:"Python (pandas + scipy)",cat:"Data",prog:40,note:"Statistical analysis & automation"},
{name:"Academic Writing",cat:"PhD",prog:70,note:"Revising from reviewer feedback"},
{name:"Data Visualization",cat:"PhD",prog:50,note:"Heatmaps, biplots, multi-panel figures"},
];

// ─── Storage ────────────────────────────────────────────────
const LS={
  get(k,d){try{const v=localStorage.getItem("nphd_"+k);return v?JSON.parse(v):d}catch(e){return d}},
  set(k,v){try{localStorage.setItem("nphd_"+k,JSON.stringify(v))}catch(e){}}
};

function getTodayKey(){return new Date().toISOString().slice(0,10)}

// ─── SVG Icons ───────────────────────────────────────────────
const I={
  home:e("svg",{width:22,height:22,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"},e("path",{d:"M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"}),e("polyline",{points:"9 22 9 12 15 12 15 22"})),
  meal:e("svg",{width:22,height:22,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"},e("path",{d:"M18 8h1a4 4 0 010 8h-1"}),e("path",{d:"M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"}),e("line",{x1:6,y1:1,x2:6,y2:4}),e("line",{x1:10,y1:1,x2:10,y2:4}),e("line",{x1:14,y1:1,x2:14,y2:4})),
  phd:e("svg",{width:22,height:22,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"},e("path",{d:"M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"}),e("path",{d:"M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"})),
  grow:e("svg",{width:22,height:22,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"},e("polyline",{points:"22 12 18 12 15 21 9 3 6 12 2 12"})),
  fire:e("svg",{width:13,height:13,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"},e("path",{d:"M12 12c2-2.96 0-7-1-8 0 3.038-1.773 4.741-3 6-1.226 1.26-2 3.24-2 5a6 6 0 1012 0c0-1.532-1.056-3.94-2-5-1.786 3-2.791 3-4 2z"})),
  clock:e("svg",{width:13,height:13,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"},e("circle",{cx:12,cy:12,r:10}),e("polyline",{points:"12 6 12 12 16 14"})),
};

// ─── App ─────────────────────────────────────────────────────
function App(){
  const[tab,setTab]=useState("home");
  const[selIng,setSelIng]=useState([]);
  const[meals,setMeals]=useState(()=>LS.get("meals_"+getTodayKey(),[]));
  const[expPaper,setExpPaper]=useState(null);
  const[showStats,setShowStats]=useState(false);
  const[mealFilter,setMealFilter]=useState("all");
  const[splash,setSplash]=useState(true);
  const[streak,setStreak]=useState(()=>LS.get("streak",0));
  const[weekLog,setWeekLog]=useState(()=>LS.get("weeklog",{}));
  const contentRef=useRef(null);

  useEffect(()=>{setTimeout(()=>setSplash(false),1200)},[]);
  useEffect(()=>{LS.set("meals_"+getTodayKey(),meals)},[meals]);
  useEffect(()=>{if(contentRef.current)contentRef.current.scrollTop=0},[tab]);

  // Streak logic
  useEffect(()=>{
    const today=getTodayKey();
    const tc=meals.reduce((s,m)=>s+m.cal,0);
    if(tc>=TARGETS.calories*0.8){
      const wl={...weekLog,[today]:tc};
      setWeekLog(wl);LS.set("weeklog",wl);
      // count consecutive days
      let s=0,d=new Date();
      while(true){const k=d.toISOString().slice(0,10);if(wl[k]&&wl[k]>=TARGETS.calories*0.8){s++;d.setDate(d.getDate()-1)}else break}
      setStreak(s);LS.set("streak",s);
    }
  },[meals]);

  const tot={cal:meals.reduce((s,m)=>s+m.cal,0),p:meals.reduce((s,m)=>s+m.p,0),c:meals.reduce((s,m)=>s+m.c,0),f:meals.reduce((s,m)=>s+m.f,0)};

  const togIng=i=>setSelIng(p=>p.includes(i)?p.filter(x=>x!==i):[...p,i]);

  const matchR=()=>{
    if(!selIng.length)return RECIPES;
    return RECIPES.map(r=>({...r,mc:r.ing.filter(i=>selIng.includes(i)).length})).filter(r=>r.mc>0).sort((a,b)=>(b.mc/b.ing.length)-(a.mc/a.ing.length));
  };

  const logMeal=r=>setMeals(p=>[...p,{...r,time:new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})}]);
  const rmMeal=i=>setMeals(p=>p.filter((_,j)=>j!==i));

  const greeting=()=>{const h=new Date().getHours();return h<12?"Good morning":h<17?"Good afternoon":"Good evening"};
  const dateStr=()=>new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

  // ── Splash ──
  const Splash=()=>e("div",{className:"splash"+(splash?"":" hide"),key:"splash"},
    e("div",{style:{fontSize:48,marginBottom:12}},"🌿"),
    e("div",{style:{fontFamily:"var(--fn-display)",fontSize:22,fontWeight:700,color:"var(--fg)"}},"NourishPhD"),
    e("div",{style:{fontSize:12,color:"var(--muted)",marginTop:4}},"Your personal ecosystem")
  );

  // ── Home ──
  const Home=()=>e("div",{className:"page",key:"home"},
    e("div",{style:{paddingTop:16,marginBottom:20}},
      e("p",{className:"date"},dateStr()),
      e("h1",null,greeting()," 🌿"),
      streak>1&&e("div",{style:{display:"inline-flex",alignItems:"center",gap:4,marginTop:6,padding:"4px 12px",borderRadius:20,background:"var(--hint-bg)",fontSize:11,color:"var(--hint-fg)",fontWeight:600}},
        "🔥 ",streak,"-day streak"
      )
    ),
    // Calorie ring
    e("div",{className:"section"},
      e("div",{style:{display:"flex",alignItems:"center",gap:20}},
        e("div",{style:{position:"relative",width:100,height:100,flexShrink:0}},
          e("svg",{width:100,height:100,viewBox:"0 0 100 100"},
            e("circle",{cx:50,cy:50,r:43,fill:"none",stroke:"var(--ring-bg)",strokeWidth:9}),
            e("circle",{cx:50,cy:50,r:43,fill:"none",stroke:"var(--accent)",strokeWidth:9,strokeDasharray:`${Math.min(tot.cal/TARGETS.calories,1)*270.2} 270.2`,strokeLinecap:"round",transform:"rotate(-90 50 50)",style:{transition:"stroke-dasharray 0.6s"}})
          ),
          e("div",{style:{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}},
            e("div",{style:{fontSize:20,fontWeight:700,fontFamily:"var(--fn-display)",lineHeight:1}},tot.cal),
            e("div",{style:{fontSize:9,color:"var(--muted)",marginTop:2}},"/ ",TARGETS.calories)
          )
        ),
        e("div",{style:{flex:1}},
          e("div",{style:{fontFamily:"var(--fn-display)",fontSize:14,fontWeight:600,marginBottom:10}},"Daily Nutrition"),
          [{l:"Protein",v:tot.p,mx:TARGETS.protein,u:"g",cl:"#E8913A"},{l:"Carbs",v:tot.c,mx:TARGETS.carbs,u:"g",cl:"#5B8C5A"},{l:"Fat",v:tot.f,mx:TARGETS.fat,u:"g",cl:"#7B68AE"}].map(n=>
            e("div",{key:n.l,style:{marginBottom:7}},
              e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--muted)",marginBottom:2}},e("span",null,n.l),e("span",null,n.v,"/",n.mx,n.u)),
              e("div",{className:"macro-bar"},e("div",{className:"macro-fill",style:{background:n.cl,width:Math.min(n.v/n.mx*100,100)+"%"}}))
            )
          )
        )
      ),
      tot.cal===0&&e("div",{className:"hint"},"✨ No meals logged yet. Head to ",e("strong",null,"Meals")," to find ideas from your ingredients!"),
      tot.cal>0&&tot.cal<TARGETS.calories&&e("div",{className:"hint"},"✨ You need ",e("strong",null,TARGETS.calories-tot.cal," more kcal")," today. Try a calorie-dense snack!")
    ),
    // Logged meals
    meals.length>0&&e("div",{style:{marginBottom:14}},
      e("h3",null,"Today's Meals"),
      meals.map((m,i)=>e("div",{key:i,className:"section-sm",style:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
        e("div",null,
          e("div",{style:{fontSize:13,fontWeight:600}},m.name),
          e("div",{style:{fontSize:11,color:"var(--muted)",marginTop:2}},m.time," · ",m.cal," kcal · ",m.p,"g protein")
        ),
        e("button",{onClick:()=>rmMeal(i),style:{color:"var(--muted)",fontSize:20,padding:4}},"×")
      ))
    ),
    // PhD mini
    e("div",{className:"section"},
      e("h3",{style:{marginBottom:12}},"PhD Progress"),
      e("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
        PAPERS.map(p=>e("div",{key:p.id,style:{flex:"1 1 45%",padding:"10px 12px",borderRadius:10,background:p.color+"18",border:"1px solid "+p.color+"30"}},
          e("div",{style:{fontSize:11,fontWeight:700,color:p.color,fontFamily:"var(--fn-display)"}},p.title),
          e("div",{style:{fontSize:10,color:"var(--muted)",marginTop:2}},p.status)
        ))
      ),
      e("button",{onClick:()=>setTab("phd"),style:{marginTop:12,width:"100%",padding:10,borderRadius:10,border:"1px solid var(--border)",fontSize:12,color:"var(--fg)",display:"flex",alignItems:"center",justifyContent:"center",gap:6}},"View details & stat ideas →")
    ),
    // Tip
    e("div",{style:{background:"linear-gradient(135deg,#5B8C5A22,#E8913A18)",borderRadius:20,padding:20,border:"1px solid var(--border)"}},
      e("div",{style:{fontSize:13,fontWeight:600,fontFamily:"var(--fn-display)",marginBottom:6}},"💡 Weight Gain Tip"),
      e("div",{style:{fontSize:12,color:"var(--muted)",lineHeight:1.6}},"At 50 kg / 5'3\", aim for ~300–500 kcal surplus daily. Focus on calorie-dense vegetarian foods: ghee, paneer, peanut butter, full-fat dairy, nuts. Three meals + two snacks is your framework.")
    )
  );

  // ── Meals ──
  const Meals=()=>{
    const recs=matchR();
    const filtered=mealFilter==="all"?recs:recs.filter(r=>r.meal===mealFilter);
    return e("div",{className:"page",key:"meals"},
      e("div",{style:{paddingTop:16,marginBottom:16}},
        e("h1",null,"Meal Ideas"),
        e("p",{className:"sub"},"Tap ingredients you have — recipes adapt instantly")
      ),
      e("div",{style:{marginBottom:18}},
        e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
          e("h3",{style:{margin:0}},"What's in your kitchen?"),
          selIng.length>0&&e("button",{onClick:()=>setSelIng([]),style:{color:"var(--accent)",fontSize:11}},"Clear")
        ),
        e("div",{style:{display:"flex",flexWrap:"wrap",gap:0}},
          INGREDIENTS.map(i=>e("button",{key:i,className:"chip"+(selIng.includes(i)?" active":""),onClick:()=>togIng(i)},i))
        )
      ),
      e("div",{style:{display:"flex",marginBottom:14,overflowX:"auto"}},
        ["all","breakfast","lunch","dinner","snack"].map(f=>e("button",{key:f,className:"filter-btn"+(mealFilter===f?" active":""),onClick:()=>setMealFilter(f)},f==="all"?"All":f.charAt(0).toUpperCase()+f.slice(1)))
      ),
      filtered.length===0&&e("div",{style:{textAlign:"center",padding:40,color:"var(--muted)",fontSize:13}},"No matching recipes. Try different ingredients."),
      filtered.map((r,i)=>e("div",{key:i,className:"recipe-card"},
        e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
          e("div",{style:{flex:1}},
            e("div",{style:{display:"flex",alignItems:"center",gap:6,marginBottom:4}},
              e("span",{className:"tag",style:{background:"var(--accent)18",color:"var(--accent)"}},r.meal),
              r.mc&&r.mc===r.ing.length&&e("span",{className:"tag",style:{background:"#5B8C5A22",color:"#5B8C5A"}},"✓ ALL")
            ),
            e("div",{style:{fontFamily:"var(--fn-display)",fontSize:15,fontWeight:600,margin:"4px 0"}},r.name),
            e("div",{style:{display:"flex",gap:10,fontSize:11,color:"var(--muted)",alignItems:"center"}},
              e("span",{style:{display:"flex",alignItems:"center",gap:3}},I.fire," ",r.cal," kcal"),
              e("span",{style:{display:"flex",alignItems:"center",gap:3}},I.clock," ",r.t," min"),
              e("span",null,"P:",r.p,"g")
            )
          ),
          e("button",{className:"log-btn",onClick:()=>logMeal(r)},"+ Log")
        ),
        e("div",{style:{marginTop:8,display:"flex",gap:0,flexWrap:"wrap"}},
          r.ing.map(ig=>e("span",{key:ig,className:"ing-tag",style:{background:selIng.includes(ig)?"#5B8C5A22":"var(--ring-bg)",color:selIng.includes(ig)?"#5B8C5A":"var(--muted)",border:"1px solid "+(selIng.includes(ig)?"#5B8C5A30":"transparent")}},ig))
        ),
        r.tip&&e("div",{className:"hint",style:{marginTop:8,padding:"6px 10px",fontSize:11}},"💡 ",r.tip)
      ))
    );
  };

  // ── PhD ──
  const PhD=()=>e("div",{className:"page",key:"phd"},
    e("div",{style:{paddingTop:16,marginBottom:16}},
      e("h1",null,"PhD Tracker"),
      e("p",{className:"sub"},"Grapevine Research · 5 papers by 2028")
    ),
    e("div",{className:"section"},
      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        e("h3",{style:{margin:0}},"Paper Pipeline"),
        e("span",{style:{fontSize:11,color:"var(--muted)"}},PAPERS.filter(p=>p.status==="Revision"||p.status==="Drafting").length,"/5 active")
      ),
      PAPERS.map(p=>e("div",{key:p.id,className:"paper-card",onClick:()=>setExpPaper(expPaper===p.id?null:p.id),style:{border:"1px solid "+p.color+"30",background:p.color+"08"}},
        e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
          e("div",{style:{display:"flex",alignItems:"center",gap:10}},
            e("div",{style:{width:10,height:10,borderRadius:"50%",background:p.color}}),
            e("span",{style:{fontSize:13,fontWeight:600,fontFamily:"var(--fn-display)"}},p.title)
          ),
          e("span",{className:"tag",style:{background:p.color+"22",color:p.color}},p.status)
        ),
        expPaper===p.id&&e("div",{style:{marginTop:10,paddingTop:10,borderTop:"1px solid "+p.color+"20"}},
          e("p",{style:{fontSize:12,color:"var(--muted)",lineHeight:1.6}},p.desc)
        )
      ))
    ),
    e("div",{className:"section"},
      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}},
        e("h3",{style:{margin:0}},"Statistical Analysis Ideas"),
        e("button",{onClick:()=>setShowStats(!showStats),style:{color:"var(--accent)",fontSize:12}},showStats?"Collapse":"Expand")
      ),
      e("p",{style:{fontSize:11,color:"var(--muted)",margin:"4px 0 12px"}},"Methods for grapevine phenotypic/genotypic datasets"),
      showStats&&STATS.map((s,i)=>e("div",{key:i,className:"stat-card"},
        e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}},
          e("div",{style:{fontSize:13,fontWeight:600,fontFamily:"var(--fn-display)"}},s.m),
          e("span",{className:"tag",style:{background:"var(--accent)18",color:"var(--accent)"}},"Papers ",s.pp)
        ),
        e("p",{style:{fontSize:11,color:"var(--muted)",lineHeight:1.5}},s.u)
      )),
      !showStats&&e("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
        STATS.slice(0,4).map((s,i)=>e("span",{key:i,style:{fontSize:10,padding:"4px 10px",borderRadius:8,background:"var(--ring-bg)",color:"var(--muted)",border:"1px solid var(--border)"}},s.m)),
        e("span",{key:"more",onClick:()=>setShowStats(true),style:{fontSize:10,padding:"4px 10px",borderRadius:8,background:"var(--accent)12",color:"var(--accent)",cursor:"pointer"}},"+",STATS.length-4," more")
      )
    )
  );

  // ── Growth ──
  const Growth=()=>e("div",{className:"page",key:"growth"},
    e("div",{style:{paddingTop:16,marginBottom:16}},
      e("h1",null,"Growth"),
      e("p",{className:"sub"},"Skills & self-development")
    ),
    SKILLS.map((s,i)=>e("div",{key:i,className:"skill-card"},
      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
        e("div",null,
          e("div",{style:{fontSize:14,fontWeight:600,fontFamily:"var(--fn-display)"}},s.name),
          e("span",{style:{fontSize:10,color:"var(--accent)"}},s.cat)
        ),
        e("span",{style:{fontSize:20,fontWeight:700,fontFamily:"var(--fn-display)"}},s.prog,"%")
      ),
      e("div",{className:"macro-bar",style:{height:6}},e("div",{className:"macro-fill",style:{background:"var(--accent)",width:s.prog+"%"}})),
      e("p",{style:{fontSize:11,color:"var(--muted)",marginTop:8}},s.note)
    )),
    e("div",{className:"section"},
      e("h3",null,"Body Progress"),
      e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
        [{l:"Current Weight",v:"50 kg"},{l:"Target",v:"55–58 kg"},{l:"Height",v:"5'3\" / 160cm"},{l:"Daily Surplus",v:"+300–500 kcal"}].map((d,i)=>
          e("div",{key:i,className:"metric-box"},
            e("div",{className:"metric-val"},d.v),
            e("div",{className:"metric-label"},d.l)
          )
        )
      ),
      e("p",{style:{fontSize:11,color:"var(--muted)",marginTop:12,lineHeight:1.6}},"For healthy weight gain with muscle development: combine caloric surplus with bodyweight exercises (squats, lunges, push-ups) 3–4× per week. Progressive overload is key.")
    ),
    // Week overview
    e("div",{className:"section",style:{marginTop:0}},
      e("h3",null,"This Week"),
      e("div",{style:{display:"flex",justifyContent:"space-between",gap:4}},
        ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map((d,i)=>{
          const dt=new Date();dt.setDate(dt.getDate()-(dt.getDay()||7)+i+1);
          const k=dt.toISOString().slice(0,10);
          const logged=weekLog[k]||0;
          const pct=Math.min(logged/TARGETS.calories,1);
          const isToday=k===getTodayKey();
          return e("div",{key:d,style:{flex:1,textAlign:"center"}},
            e("div",{style:{fontSize:10,color:isToday?"var(--accent)":"var(--muted)",fontWeight:isToday?700:400,marginBottom:4}},d),
            e("div",{style:{height:40,borderRadius:6,background:"var(--ring-bg)",position:"relative",overflow:"hidden"}},
              e("div",{style:{position:"absolute",bottom:0,width:"100%",height:pct*100+"%",borderRadius:6,background:pct>=0.8?"var(--accent)":"var(--accent)44",transition:"height 0.4s"}})
            )
          );
        })
      )
    )
  );

  // ── Navigation ──
  const tabs=[{id:"home",icon:I.home,label:"Home"},{id:"meals",icon:I.meal,label:"Meals"},{id:"phd",icon:I.phd,label:"PhD"},{id:"growth",icon:I.grow,label:"Growth"}];

  return e("div",{className:"app"},
    Splash(),
    e("div",{className:"content",ref:contentRef},
      tab==="home"&&Home(),
      tab==="meals"&&Meals(),
      tab==="phd"&&PhD(),
      tab==="growth"&&Growth()
    ),
    e("nav",{className:"nav"},
      tabs.map(t=>e("button",{key:t.id,className:"nav-btn"+(tab===t.id?" active":""),onClick:()=>setTab(t.id)},t.icon,e("span",null,t.label)))
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
